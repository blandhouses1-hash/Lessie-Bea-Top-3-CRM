<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lessie Bea Daily Top 3</title>

<style>
body{font-family:Arial;background:#fff0f5;padding:20px;color:#333}
h1,h2,h3{color:#c71585}
.card{background:#fff;border:1px solid #f3c1d9;border-radius:12px;padding:16px;margin-bottom:20px}
input,button,textarea{padding:8px;border-radius:8px;border:1px solid #ccc}
button{background:#ffb6c1;font-weight:bold;cursor:pointer;border:none}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#ffb6c1}
.status{width:35px;height:35px;border:none;border-radius:8px}
.done{background:#d8f5d0}
</style>

</head>
<body>

<h1>💜 Lessie Bea Daily Top 3</h1>

<div class="card">
<input type="date" id="date">
<label><input type="checkbox" id="workout"> Workout</label>
<label><input type="checkbox" id="wholesale"> Wholesale</label>
<label><input type="checkbox" id="goal"> Goal</label>
<br><br>
<input id="type" placeholder="Workout Type">
<input type="time" id="start">
<input type="time" id="stop">
<input id="goalname" placeholder="Goal Name">
<textarea id="rework" placeholder="Real Estate Work"></textarea>
<br><br>
<button onclick="saveDay()">Check-In</button>
</div>

<div class="card">
<h2>🏆 Weekly Quiz</h2>
<input type="date" id="weekof">
<br><br>
<label><input type="checkbox" id="q1"> Workout 5 days</label><br>
<label><input type="checkbox" id="q2"> Move daily</label><br>
<label><input type="checkbox" id="q3"> Call 100 sellers</label><br>
<label><input type="checkbox" id="q4"> Add 25 leads</label><br>
<label><input type="checkbox" id="q5"> 10 followups</label><br>
<label><input type="checkbox" id="q6"> Analyze 5 deals</label><br>
<label><input type="checkbox" id="q7"> 5 hours goal work</label><br><br>

<button onclick="gradeWeek()">Grade My Week</button>
<button onclick="saveWeek()">⭐ Save This Week</button>

<h3 id="wscore">0 / 21</h3>
<h3 id="wgrade">F</h3>

<h3>Saved Weekly History</h3>
<table>
<thead><tr><th>Week</th><th>Score</th><th>Grade</th></tr></thead>
<tbody id="whistory"></tbody>
</table>
</div>

<div class="card">
<h2>🏆 Monthly Report</h2>
<input type="month" id="month">
<button onclick="loadMonth()">Load From Weeks</button>
<button onclick="saveMonth()">Save Month</button>

<h3 id="mresult"></h3>

<table>
<thead><tr><th>Month</th><th>Grade</th></tr></thead>
<tbody id="mhistory"></tbody>
</table>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Date</th>
<th>Workout</th>
<th>Wholesale</th>
<th>Goal</th>
<th>Type</th>
<th>Start</th>
<th>Stop</th>
<th>Goal Name</th>
<th>Real Estate</th>
<th>Delete</th>
</tr>
</thead>
<tbody id="days"></tbody>
</table>
</div>

<script>

const STORAGE_KEY="lb_top3_data_v3";
const WEEKLY_KEY="lb_top3_weekly_history_v1";
const MONTHLY_KEY="lb_top3_monthly_history_v1";

function getDays(){return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]")}
function setDays(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d));renderDays()}

function saveDay(){
let d=getDays();
let date=document.getElementById("date").value;
if(!date)return alert("Pick date");
let obj={
date,
workout:workout.checked,
wholesale:wholesale.checked,
goal:goal.checked,
type:type.value,
start:start.value,
stop:stop.value,
goalname:goalname.value,
rework:rework.value
};
let i=d.findIndex(x=>x.date===date);
if(i>-1)d[i]=obj; else d.push(obj);
setDays(d);
}

function renderDays(){
let d=getDays();
let html="";
d.sort((a,b)=>a.date.localeCompare(b.date));
d.forEach(x=>{
html+=`<tr>
<td>${x.date}</td>
<td><button class="status ${x.workout?'done':''}" onclick="toggle('${x.date}','workout')">${x.workout?'✔':''}</button></td>
<td><button class="status ${x.wholesale?'done':''}" onclick="toggle('${x.date}','wholesale')">${x.wholesale?'✔':''}</button></td>
<td><button class="status ${x.goal?'done':''}" onclick="toggle('${x.date}','goal')">${x.goal?'✔':''}</button></td>
<td>${x.type||""}</td>
<td>${x.start||""}</td>
<td>${x.stop||""}</td>
<td>${x.goalname||""}</td>
<td>${x.rework||""}</td>
<td><button onclick="del('${x.date}')">X</button></td>
</tr>`
});
days.innerHTML=html;
}

function toggle(date,f){
let d=getDays();
let x=d.find(a=>a.date===date);
x[f]=!x[f];
setDays(d);
}

function del(date){
setDays(getDays().filter(x=>x.date!==date));
}

function gradeWeek(){
let s=0;
if(q1.checked)s+=5;
if(q2.checked)s+=2;
if(q3.checked)s+=3;
if(q4.checked)s+=2;
if(q5.checked)s+=2;
if(q6.checked)s+=2;
if(q7.checked)s+=5;
wscore.innerText=s+" / 21";
let g="F";
if(s>=19)g="A"; else if(s>=17)g="B"; else if(s>=14)g="C"; else if(s>=10)g="D";
wgrade.innerText=g;
}

function getWeekly(){return JSON.parse(localStorage.getItem(WEEKLY_KEY)||"[]")}
function setWeekly(w){localStorage.setItem(WEEKLY_KEY,JSON.stringify(w));renderWeekly()}

function saveWeek(){
gradeWeek();
let w=getWeekly();
let week=weekof.value;
if(!week)return alert("Pick week");
let score=parseInt(wscore.innerText);
let grade=wgrade.innerText;
let i=w.findIndex(x=>x.week===week);
if(i>-1)w[i]={week,score,grade}; else w.push({week,score,grade});
setWeekly(w);
}

function renderWeekly(){
let w=getWeekly();
let html="";
w.forEach(x=>{
html+=`<tr><td>${x.week}</td><td>${x.score}</td><td>${x.grade}</td></tr>`
});
whistory.innerHTML=html;
}

function getMonthly(){return JSON.parse(localStorage.getItem(MONTHLY_KEY)||"[]")}
function setMonthly(m){localStorage.setItem(MONTHLY_KEY,JSON.stringify(m));renderMonthly()}

function loadMonth(){
let m=month.value;
let w=getWeekly().filter(x=>x.week.startsWith(m));
let avg=Math.round(w.reduce((a,b)=>a+b.score,0)/(w.length||1));
let g="F";
if(avg>=19)g="A"; else if(avg>=17)g="B"; else if(avg>=14)g="C"; else if(avg>=10)g="D";
mresult.innerText="Average "+avg+" → "+g;
}

function saveMonth(){
let m=month.value;
if(!m)return;
let txt=mresult.innerText;
let g=txt.slice(-1);
let list=getMonthly();
let i=list.findIndex(x=>x.month===m);
if(i>-1)list[i]={month:m,grade:g}; else list.push({month:m,grade:g});
setMonthly(list);
}

function renderMonthly(){
let m=getMonthly();
let html="";
m.forEach(x=>{
html+=`<tr><td>${x.month}</td><td>${x.grade}</td></tr>`
});
mhistory.innerHTML=html;
}

renderDays();
renderWeekly();
renderMonthly();

</script>

</body>
</html>
